<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISC2 CPE Helper — Settings</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; color: #1d2733; max-width: 560px; margin: 32px auto; padding: 0 16px; }
      h1 { font-size: 18px; }
      label { display: block; font-weight: 600; margin-top: 18px; }
      .hint { font-weight: 400; color: #6b7785; font-size: 13px; margin: 2px 0 6px; }
      input, select { width: 100%; padding: 7px 8px; border: 1px solid #d6dde4; border-radius: 6px; }
      input[type="number"] { width: 120px; }
      button { margin-top: 22px; padding: 8px 16px; background: #14598a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
      #saved { color: #1a7f4b; margin-left: 12px; }
    </style>
  </head>
  <body>
    <h1>ISC2 CPE Helper — Settings</h1>

    <label for="apiKey">Claude API key</label>
    <p class="hint">
      Used to draft CPE descriptions. Stored only in this browser's extension
      storage. Create one at console.anthropic.com.
    </p>
    <input id="apiKey" type="password" placeholder="sk-ant-…" autocomplete="off" />

    <label for="model">Model</label>
    <p class="hint">Opus is highest quality; Haiku is fastest and cheapest.</p>
    <select id="model"></select>

    <label for="speed">Default playback speed</label>
    <p class="hint">Used to compute CPE credits: floor(duration / speed / 60).</p>
    <input id="speed" type="number" min="0.5" max="4" step="0.05" />

    <div>
      <button id="save" type="button">Save</button>
      <span id="saved" hidden>Saved.</span>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
